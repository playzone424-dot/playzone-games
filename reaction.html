<!DOCTYPE html><html>
<head>
  <title>Reaction Battle</title>  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    nav {
      background: rgba(0,0,0,0.4);
      padding: 15px;
    }

    nav a {
      color: #38bdf8;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      margin-top: 30px;
      color: #22c55e;
    }

    #box {
      width: 200px;
      height: 200px;
      margin: 40px auto;
      background: red;
      display: none;
      cursor: pointer;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    .info {
      margin: 10px;
      color: #cbd5f5;
    }
  </style></head><body><nav>
  <a href="index.html">Home</a>
</nav><h1>⚡ Reaction Battle</h1><p class="info">
Test your reflex speed. Click the box as soon as it turns green.
As levels increase, reaction time gets shorter.
</p><div class="info">Level: <span id="level">1</span>/10</div>
<div class="info">Score: <span id="score">0</span></div><button onclick="startGame()">Start Game</button>

<div id="box"></div><p id="result"></p><script>
let level = 1;
let score = 0;
let startTime;
let canClick = false;

function startGame() {
  level = 1;
  score = 0;
  updateUI();
  nextRound();
}

function updateUI() {
  document.getElementById("level").innerText = level;
  document.getElementById("score").innerText = score;
}

function nextRound() {
  let box = document.getElementById("box");
  box.style.display = "none";
  canClick = false;

  let maxDelay = 3000 - (level * 200);
if (maxDelay < 800) maxDelay = 800;

let delay = Math.random() * maxDelay + 500;

  setTimeout(() => {
    box.style.display = "block";
    box.style.background = "#22c55e";
    startTime = new Date().getTime();
    canClick = true;
  }, delay);
}

document.getElementById("box").onclick = function() {
  if (!canClick) {
    alert("Too early! ❌ Game Over");
    resetGame();
    return;
  }

  let endTime = new Date().getTime();
  let reactionTime = (endTime - startTime) / 1000;

  score++;
  level++;

  if (level > 10) {
    alert("🏆 You Win! Final Score: " + score);
    resetGame();
    return;
  }

  updateUI();
  nextRound();
};

function resetGame() {
  level = 1;
  score = 0;
  document.getElementById("box").style.display = "none";
  updateUI();
}
</script></body>
</html>
