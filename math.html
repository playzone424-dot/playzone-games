<!DOCTYPE html><html>
<head>
  <title>Quick Math Quiz</title>  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    nav {
      background: rgba(0,0,0,0.4);
      padding: 15px;
    }

    nav a {
      color: #38bdf8;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      margin-top: 30px;
      color: #22c55e;
    }

    .info {
      margin: 10px;
      color: #cbd5f5;
    }

    #question {
      font-size: 30px;
      margin: 20px;
      color: #38bdf8;
    }

    input {
      padding: 10px;
      font-size: 18px;
      text-align: center;
      width: 120px;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }
  </style></head><body><nav>
  <a href="index.html">Home</a>
</nav><h1>🧠 Quick Math Quiz</h1><p class="info">
Solve math problems as fast as you can. Difficulty increases with levels.
</p><div class="info">Level: <span id="level">1</span>/10</div>
<div class="info">Score: <span id="score">0</span></div>
<div class="info">Time: <span id="time">5</span>s</div><div id="question">Press Start</div><input type="number" id="answer" placeholder="Answer" disabled><br>
<button onclick="startGame()">Start Game</button><script>
let level = 1;
let score = 0;
let time = 5;
let correctAnswer;
let timer;

function startGame() {
  level = 1;
  score = 0;
  time = 5;

  document.getElementById("answer").disabled = false;
  document.getElementById("answer").focus();

  updateUI();
  newQuestion();
  startTimer();
}

function updateUI() {
  document.getElementById("level").innerText = level;
  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = time;
}

function newQuestion() {
  let num1, num2;

  if (level <= 3) {
    num1 = Math.floor(Math.random() * 10);
    num2 = Math.floor(Math.random() * 10);
    correctAnswer = num1 + num2;
    document.getElementById("question").innerText = num1 + " + " + num2;
  } 
  else if (level <= 6) {
    num1 = Math.floor(Math.random() * 20);
    num2 = Math.floor(Math.random() * 10);
    correctAnswer = num1 - num2;
    document.getElementById("question").innerText = num1 + " - " + num2;
  } 
  else {
    num1 = Math.floor(Math.random() * 10);
    num2 = Math.floor(Math.random() * 10);
    correctAnswer = num1 * num2;
    document.getElementById("question").innerText = num1 + " × " + num2;
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    time--;
    updateUI();

    if (time <= 0) {
      clearInterval(timer);
      alert("💀 Game Over! Score: " + score);
      resetGame();
    }
  }, 1000);
}

document.getElementById("answer").addEventListener("input", function() {
  let userAnswer = Number(this.value);

  if (userAnswer === correctAnswer) {
    score++;
    this.value = "";

    if (score % 2 === 0) {
      level++;

      if (level > 10) {
        alert("🏆 You Win! Final Score: " + score);
        resetGame();
        return;
      }

      time = 5 - Math.floor(level / 2);
      if (time < 2) time = 2;
    }

    time += 1;
    updateUI();
    newQuestion();
  }
});

function resetGame() {
  level = 1;
  score = 0;
  time = 5;
  document.getElementById("answer").disabled = true;
  document.getElementById("question").innerText = "Press Start";
  updateUI();
}
</script></body>
</html>
