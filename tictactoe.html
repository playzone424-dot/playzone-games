<!DOCTYPE html><html>
<head>
  <title>Tic Tac Toe</title>  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    nav {
      background: rgba(0,0,0,0.4);
      padding: 15px;
    }

    nav a {
      color: #38bdf8;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      margin-top: 30px;
      color: #22c55e;
    }

    p {
      color: #cbd5f5;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      border-radius: 8px;
    }

    .cell:hover {
      background: rgba(255,255,255,0.1);
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      cursor: pointer;
    }
  </style></head><body><nav>
  <a href="index.html">Home</a>
</nav><h1>🎯 Tic Tac Toe</h1><p>
Play the classic game with a friend. Take turns and try to win!
</p><div class="board" id="board"></div><h2 id="status">Player X's Turn</h2><button onclick="resetGame()">Restart</button>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;

const winConditions = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function createBoard() {
  const boardElement = document.getElementById("board");
  boardElement.innerHTML = "";

  board.forEach((cell, index) => {
    const div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;
    div.addEventListener("click", () => handleClick(index));
    boardElement.appendChild(div);
  });
}

function handleClick(index) {
  if (board[index] !== "" || !gameActive) return;

  board[index] = currentPlayer;
  createBoard();
  checkWinner();

  currentPlayer = currentPlayer === "X" ? "O" : "X";
  document.getElementById("status").innerText = "Player " + currentPlayer + "'s Turn";
}

function checkWinner() {
  for (let condition of winConditions) {
    let [a, b, c] = condition;

    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      document.getElementById("status").innerText = "🎉 Player " + board[a] + " Wins!";
      gameActive = false;
      return;
    }
  }

  if (!board.includes("")) {
    document.getElementById("status").innerText = "😐 It's a Draw!";
    gameActive = false;
  }
}

function resetGame() {
  board = ["","","","","","","","",""];
  currentPlayer = "X";
  gameActive = true;
  document.getElementById("status").innerText = "Player X's Turn";
  createBoard();
}

createBoard();
</script></body>
</html>
